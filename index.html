<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HANUL C&B — BIM사업본부</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0c;--bg-raised:#141417;--bg-surface:#1a1a1f;--bg-hover:#222228;
  --border:#26262d;--border-light:#35353e;
  --text:#f0f0f2;--text-2:#9898a4;--text-3:#5e5e6c;
  --accent:#10b981;--accent-dim:rgba(16,185,129,.10);
  --danger:#ef4444;--blue:#3b82f6;
  --font:'Pretendard Variable','Pretendard',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
  --header-h:66px;
}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:15px}

/* LOGIN */
.login-screen{position:fixed;inset:0;z-index:500;display:flex;align-items:center;justify-content:center;background:var(--bg)}
.login-screen.hidden{display:none}
.login-box{width:420px;max-width:92vw;background:var(--bg-raised);border:1px solid var(--border);border-radius:18px;padding:44px 40px;box-shadow:0 20px 60px rgba(0,0,0,.5);animation:fadeIn .3s ease}
.login-box .login-logo{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:8px}
.login-box .login-sub{font-size:14px;color:var(--text-3);margin-bottom:32px;text-align:center}
.login-box label{font-size:14px;font-weight:700;color:var(--text-2);display:block;margin-bottom:8px}
.login-box input{width:100%;height:48px;padding:0 16px;border-radius:10px;border:1px solid var(--border);background:var(--bg-surface);color:var(--text);font-size:15px;font-family:var(--font);outline:none;transition:.15s;margin-bottom:18px}
.login-box input:focus{border-color:var(--accent)}
.login-box input::placeholder{color:var(--text-3)}
.login-box .login-btn{width:100%;height:48px;border:none;border-radius:10px;background:linear-gradient(135deg,#10b981,#059669);color:#000;font-size:16px;font-weight:700;font-family:var(--font);cursor:pointer;transition:.15s;box-shadow:0 4px 16px rgba(16,185,129,.3)}
.login-box .login-btn:hover{filter:brightness(1.1);transform:translateY(-1px)}
.login-box .login-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;filter:none}
.login-box .login-error{color:var(--danger);font-size:13px;margin-top:12px;display:none;text-align:center}
.login-box .login-hint{margin-top:20px;padding:14px 16px;border-radius:8px;background:var(--bg-surface);font-size:13px;color:var(--text-3);line-height:1.8}
.login-box .login-hint strong{color:var(--text-2)}

.app{display:none;flex-direction:column;height:100%}.app.show{display:flex}
header{height:var(--header-h);display:flex;align-items:center;padding:0 28px;background:linear-gradient(180deg,#0e0e12 0%,var(--bg) 100%);border-bottom:1px solid var(--border);position:relative;z-index:50;gap:16px}
.logo{display:flex;align-items:center;gap:14px;white-space:nowrap;flex-shrink:0}
.logo-img{display:inline-block;height:32px}
.logo-img img{height:32px;width:auto;opacity:.85;filter:drop-shadow(0 0 8px rgba(255,255,255,.25)) drop-shadow(0 0 20px rgba(255,255,255,.1)) drop-shadow(0 2px 4px rgba(0,0,0,.3));transition:all .3s ease}
.logo-img:hover img{opacity:1;filter:drop-shadow(0 0 12px rgba(255,255,255,.4)) drop-shadow(0 0 30px rgba(255,255,255,.15))}
.logo .divider{width:1px;height:24px;background:var(--border-light);margin:0 1px}
.logo em{font-style:normal;font-weight:700;font-size:17px;background:linear-gradient(135deg,#10b981 0%,#34d399 50%,#6ee7b7 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

nav{display:flex;align-items:center;gap:8px;margin-left:28px;height:100%;overflow-x:auto;scrollbar-width:none;flex:1;min-width:0;-webkit-overflow-scrolling:touch}
nav::-webkit-scrollbar{display:none}

.tab{position:relative;display:flex;align-items:center;padding:9px 24px;font-size:15px;font-weight:500;color:var(--text-2);cursor:pointer;white-space:nowrap;border:1px solid rgba(255,255,255,.12);background:linear-gradient(165deg,rgba(255,255,255,.08) 0%,rgba(255,255,255,.03) 50%,rgba(255,255,255,.05) 100%);-webkit-backdrop-filter:blur(24px) saturate(200%) brightness(1.1);backdrop-filter:blur(24px) saturate(200%) brightness(1.1);font-family:var(--font);transition:all .3s cubic-bezier(.4,0,.2,1);border-radius:14px;margin:0 1px;box-shadow:0 2px 6px rgba(0,0,0,.25),0 0 1px rgba(255,255,255,.15),inset 0 1px 1px rgba(255,255,255,.12),inset 0 -1px 1px rgba(0,0,0,.1);overflow:hidden}
.tab::before{content:'';position:absolute;inset:0;background:linear-gradient(175deg,rgba(255,255,255,.14) 0%,rgba(255,255,255,.06) 25%,rgba(255,255,255,0) 50%,rgba(255,255,255,.02) 80%,rgba(255,255,255,.05) 100%);pointer-events:none;border-radius:inherit}
.tab::after{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at 30% 20%,rgba(255,255,255,.06) 0%,transparent 60%);pointer-events:none}
.tab:hover{color:var(--text);background:linear-gradient(165deg,rgba(255,255,255,.14) 0%,rgba(255,255,255,.06) 50%,rgba(255,255,255,.08) 100%);border-color:rgba(255,255,255,.22);transform:translateY(-1px)}
.tab.active{color:var(--text);font-weight:700;background:linear-gradient(165deg,rgba(16,185,129,.18) 0%,rgba(16,185,129,.06) 50%,rgba(16,185,129,.10) 100%);border-color:rgba(16,185,129,.4);box-shadow:0 4px 20px rgba(16,185,129,.2),0 0 1px rgba(16,185,129,.5),inset 0 1px 1px rgba(255,255,255,.15)}
.tab.active::before{background:linear-gradient(175deg,rgba(16,185,129,.2) 0%,rgba(16,185,129,.08) 25%,transparent 50%,rgba(16,185,129,.03) 80%,rgba(16,185,129,.06) 100%)}
.tab.active::after{background:radial-gradient(ellipse at 30% 20%,rgba(16,185,129,.1) 0%,transparent 60%)}
.tab-add{width:38px;height:38px;border-radius:12px;flex-shrink:0;display:grid;place-items:center;cursor:pointer;border:1px dashed rgba(255,255,255,.12);background:linear-gradient(165deg,rgba(255,255,255,.06) 0%,rgba(255,255,255,.02) 100%);color:var(--text-3);font-size:22px;transition:all .25s;font-family:var(--font);margin-left:6px}
.tab-add:hover{border-color:rgba(16,185,129,.4);color:var(--accent);transform:translateY(-1px)}

.h-right{margin-left:auto;display:flex;align-items:center;gap:10px;flex-shrink:0}
.h-right .user{height:36px;padding:0 18px;border-radius:18px;background:var(--bg-surface);border:1px solid var(--border);font-size:14px;color:var(--text-2);display:flex;align-items:center;gap:8px;cursor:pointer;transition:.15s}
.h-right .user:hover{border-color:var(--border-light);background:var(--bg-hover)}
.h-right .role-tag{font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px;background:var(--accent-dim);color:var(--accent)}

.toolbar{height:52px;display:flex;align-items:center;gap:12px;padding:0 28px;background:var(--bg-raised);border-bottom:1px solid var(--border);flex-shrink:0}
.toolbar h2{font-size:18px;font-weight:700;letter-spacing:-.3px}
.toolbar .badge{height:26px;padding:0 11px;border-radius:13px;font-size:13px;font-weight:700;background:var(--accent-dim);color:var(--accent);display:inline-flex;align-items:center}
.toolbar .sep{width:1px;height:22px;background:var(--border);margin:0 8px}
.toolbar .hint{font-size:14px;color:var(--text-3);margin-left:auto}
.btn-sm{height:36px;padding:0 18px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;border:1px solid var(--border);background:var(--bg-surface);color:var(--text);font-family:var(--font);transition:.12s;white-space:nowrap}
.btn-sm:hover{background:var(--bg-hover);border-color:var(--border-light)}
.btn-sm.accent{background:var(--accent);color:#000;border-color:var(--accent)}
.btn-sm.accent:hover{filter:brightness(1.15)}
.btn-sm.danger{border-color:rgba(239,68,68,.3);color:var(--danger)}
.btn-sm.danger:hover{background:rgba(239,68,68,.08)}
.btn-sm:disabled{opacity:.5;cursor:not-allowed}

.content{flex:1;display:flex;flex-direction:column;position:relative;overflow:hidden}
.iframe-wrap{flex:1;position:relative;background:var(--bg)}
.iframe-wrap iframe{width:100%;height:100%;border:none;background:#fff}
.url-panel{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);z-index:10;gap:24px;animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.url-card{width:520px;max-width:90vw;background:var(--bg-raised);border:1px solid var(--border);border-radius:14px;padding:36px}
.url-card h3{font-size:22px;font-weight:800;margin-bottom:8px}
.url-card p{font-size:15px;color:var(--text-2);margin-bottom:24px;line-height:1.6}
.url-card label{font-size:14px;font-weight:700;color:var(--text-2);display:block;margin-bottom:8px}
.url-card input{width:100%;height:44px;padding:0 16px;border-radius:8px;border:1px solid var(--border);background:var(--bg-surface);color:var(--text);font-size:15px;font-family:var(--font);outline:none;transition:.15s}
.url-card input:focus{border-color:var(--accent)}
.url-card .actions{display:flex;justify-content:flex-end;gap:8px;margin-top:24px}
.url-card .steps{background:var(--bg-surface);border-radius:8px;padding:16px 18px;margin-bottom:20px;font-size:14px;line-height:1.9;color:var(--text-2)}
.url-card .steps strong{color:var(--text);font-weight:600}

.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal-bg.show{display:flex}
.modal{width:540px;max-width:92vw;background:var(--bg-raised);border:1px solid var(--border);border-radius:14px;padding:32px 36px;animation:fadeIn .2s ease;max-height:90vh;overflow-y:auto}
.modal h3{font-size:20px;font-weight:800;margin-bottom:20px}
.modal label{font-size:14px;font-weight:700;color:var(--text-2);display:block;margin-bottom:8px}
.modal input,.modal select{width:100%;height:44px;padding:0 14px;border-radius:8px;border:1px solid var(--border);background:var(--bg-surface);color:var(--text);font-size:15px;font-family:var(--font);outline:none;margin-bottom:16px}
.modal input:focus,.modal select:focus{border-color:var(--accent)}
.modal .row{display:flex;gap:12px}.modal .row>*{flex:1}
.modal .actions{display:flex;justify-content:flex-end;gap:8px;margin-top:12px}

/* SETTINGS */
.settings-wrap{position:absolute;inset:0;background:var(--bg);z-index:10;overflow-y:auto;padding:32px;animation:fadeIn .25s ease}
.s-section{background:var(--bg-raised);border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:24px}
.s-section h4{font-size:16px;font-weight:700;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.s-table{width:100%;border-collapse:collapse;font-size:14px}
.s-table th{text-align:left;padding:10px 12px;color:var(--text-2);font-weight:600;border-bottom:1px solid var(--border);font-size:13px}
.s-table td{padding:10px 12px;border-bottom:1px solid rgba(255,255,255,.04)}
.s-table tr:last-child td{border-bottom:none}
.s-table input,.s-table select{height:36px;padding:0 10px;border-radius:6px;border:1px solid var(--border);background:var(--bg-surface);color:var(--text);font-size:14px;font-family:var(--font);outline:none;width:100%}
.s-table input:focus,.s-table select:focus{border-color:var(--accent)}
.s-add-row{display:flex;gap:8px;margin-top:16px;align-items:center}
.s-add-row input,.s-add-row select{height:36px;padding:0 10px;border-radius:6px;border:1px solid var(--border);background:var(--bg-surface);color:var(--text);font-size:14px;font-family:var(--font);outline:none;flex:1}
.s-tab-url{margin-bottom:12px;display:flex;gap:8px;align-items:center}
.s-tab-url .s-tab-name{min-width:160px;font-weight:600;font-size:14px;flex-shrink:0}
.s-tab-url input{flex:1;height:36px;padding:0 10px;border-radius:6px;border:1px solid var(--border);background:var(--bg-surface);color:var(--text);font-size:14px;font-family:var(--font);outline:none}

/* LOADING SPINNER */
.spinner{display:inline-block;width:16px;height:16px;border:2px solid transparent;border-top-color:currentColor;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

footer{height:32px;display:flex;align-items:center;gap:16px;padding:0 28px;background:var(--bg);border-top:1px solid var(--border);font-size:13px;color:var(--text-3);flex-shrink:0}
footer .dot{width:6px;height:6px;border-radius:50%;background:var(--accent)}
footer .stat{display:flex;align-items:center;gap:6px}

.toast{position:fixed;bottom:44px;left:50%;transform:translateX(-50%) translateY(20px);padding:12px 24px;border-radius:10px;background:var(--bg-surface);border:1px solid var(--border);color:var(--text);font-size:15px;font-weight:500;box-shadow:0 12px 40px rgba(0,0,0,.6);z-index:300;opacity:0;transition:.3s;pointer-events:none;font-family:var(--font)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:var(--accent);color:var(--accent)}
.toast.err{border-color:var(--danger);color:var(--danger)}

@media(max-width:768px){
  :root{--header-h:auto}
  header{flex-wrap:wrap;height:auto;padding:12px 16px;gap:10px}
  .logo-img{height:26px}.logo-img img{height:26px}.logo em{font-size:14px}
  nav{order:3;width:100%;margin-left:0;height:auto;padding:4px 0 2px;gap:6px}
  .tab{padding:8px 16px;font-size:13px;border-radius:10px}
  .h-right{order:2}.h-right .user{height:32px;padding:0 12px;font-size:13px}
  .toolbar{height:auto;padding:10px 16px;flex-wrap:wrap;gap:8px}
  .toolbar h2{font-size:16px;width:100%}.toolbar .sep{display:none}.toolbar .hint{display:none}
  .btn-sm{height:32px;padding:0 14px;font-size:13px}
  .settings-wrap{padding:16px}
  .s-tab-url{flex-direction:column}.s-tab-url .s-tab-name{min-width:0}
  .login-box{padding:32px 28px;border-radius:14px}
  footer{height:28px;padding:0 16px;font-size:12px}
}
@media(max-width:400px){
  header{padding:10px 12px}.logo-img{height:20px}.logo-img img{height:20px}.logo em{font-size:12px}
  .tab{padding:7px 12px;font-size:12px;border-radius:8px}
}
</style>
</head>

<script>
// ══════════════════════════════════════════
// GAS Web App URL — 여기에 배포 URL 입력
// ══════════════════════════════════════════
const GAS_URL = '';  // <-- 배포 후 여기에 URL 붙여넣기

const SESSION_KEY = 'hanul_bim_session';

let currentUser = null;
let tabs = [];
let activeIdx = 0;
let editingIdx = -1;
let settingsMode = false;
let settingsAccounts = [];

// ══════════ API ══════════
async function api(action, data = {}) {
  if (!GAS_URL) {
    toast('GAS_URL이 설정되지 않았습니다. HTML 파일의 GAS_URL을 확인하세요.', 'err');
    throw new Error('GAS_URL not set');
  }
  const res = await fetch(GAS_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify({ action, ...data })
  });
  const json = await res.json();
  if (!json.ok) throw new Error(json.msg || '서버 오류');
  return json;
}

// ══════════ LOGIN ══════════
async function doLogin() {
  const id = document.getElementById('loginId').value.trim();
  const pw = document.getElementById('loginPw').value;
  const btn = document.getElementById('loginBtn');
  const errEl = document.getElementById('loginError');
  
  if (!id || !pw) { errEl.textContent = '아이디와 비밀번호를 입력하세요'; errEl.style.display = 'block'; return; }
  
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> 로그인 중...';
  errEl.style.display = 'none';

  try {
    const res = await api('login', { id, pw });
    currentUser = res.user;
    try { sessionStorage.setItem(SESSION_KEY, JSON.stringify(currentUser)); } catch {}
    await showApp();
  } catch (err) {
    errEl.textContent = err.message;
    errEl.style.display = 'block';
    document.getElementById('loginPw').value = '';
    document.getElementById('loginPw').focus();
  } finally {
    btn.disabled = false;
    btn.textContent = '로그인';
  }
}

function doLogout() {
  if (!confirm('로그아웃 하시겠습니까?')) return;
  currentUser = null;
  try { sessionStorage.removeItem(SESSION_KEY); } catch {}
  document.getElementById('app').classList.remove('show');
  document.getElementById('loginScreen').classList.remove('hidden');
  document.getElementById('loginId').value = '';
  document.getElementById('loginPw').value = '';
  document.getElementById('loginError').style.display = 'none';
}

function checkSession() {
  try {
    const s = sessionStorage.getItem(SESSION_KEY);
    if (s) { currentUser = JSON.parse(s); return true; }
  } catch {}
  return false;
}

async function showApp() {
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('app').classList.add('show');
  document.getElementById('userName').textContent = currentUser.name;
  document.getElementById('userRole').textContent = currentUser.role;
  document.getElementById('tabAddBtn').style.display = currentUser.role === '팀장' ? '' : 'none';
  settingsMode = false;

  // 서버에서 탭 데이터 로드
  try {
    const res = await api('getTabs');
    tabs = res.tabs || [];
    tabs.forEach(t => { if (!t.role) t.role = 'all'; });
  } catch (err) {
    toast('탭 데이터 로드 실패: ' + err.message, 'err');
    tabs = [];
  }
  render();
}

// ══════════ HELPERS ══════════
function getVisibleTabs() { return tabs.filter(t => t.role === 'all' || currentUser.role === '팀장'); }
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function escAttr(s) { return s.replace(/"/g, '&quot;').replace(/</g, '&lt;'); }
function toast(msg, cls) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show ' + (cls || '');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function toEmbedUrl(raw) {
  if (!raw) return '';
  raw = raw.trim();
  if (raw.includes('/pubhtml') || raw.includes('/pub?')) return raw;
  const match = raw.match(/\/spreadsheets\/d\/([a-zA-Z0-9_-]+)/);
  if (match) {
    const id = match[1];
    const gidMatch = raw.match(/[#&?]gid=(\d+)/);
    let embedUrl = 'https://docs.google.com/spreadsheets/d/' + id + '/edit?rm=minimal';
    if (gidMatch) embedUrl += '&gid=' + gidMatch[1];
    return embedUrl;
  }
  return raw;
}

// ══════════ RENDER ══════════
function render() {
  const visible = getVisibleTabs();
  const isManager = currentUser.role === '팀장';

  if (settingsMode && isManager) {
    renderNavWithSettings(visible);
    renderSettings();
    renderFooter(visible);
    return;
  }

  if (activeIdx >= visible.length) activeIdx = Math.max(0, visible.length - 1);
  renderNavWithSettings(visible);
  renderContent(visible);
  renderFooter(visible);
}

function renderNavWithSettings(visible) {
  const isManager = currentUser.role === '팀장';
  let html = visible.map((t, i) =>
    '<button class="tab' + (!settingsMode && i===activeIdx ? ' active' : '') + '" onclick="selectTab(' + i + ')">' + esc(t.name) + '</button>'
  ).join('');
  if (isManager) {
    html += '<button class="tab' + (settingsMode ? ' active' : '') + '" onclick="openSettings()" style="gap:6px">' +
      '<svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M8 4.754a3.246 3.246 0 1 0 0 6.492 3.246 3.246 0 0 0 0-6.492zM5.754 8a2.246 2.246 0 1 1 4.492 0 2.246 2.246 0 0 1-4.492 0z"/><path d="M9.796 1.343c-.527-1.79-3.065-1.79-3.592 0l-.094.319a.873.873 0 0 1-1.255.52l-.292-.16c-1.64-.892-3.433.902-2.54 2.541l.159.292a.873.873 0 0 1-.52 1.255l-.319.094c-1.79.527-1.79 3.065 0 3.592l.319.094a.873.873 0 0 1 .52 1.255l-.16.292c-.892 1.64.901 3.434 2.541 2.54l.292-.159a.873.873 0 0 1 1.255.52l.094.319c.527 1.79 3.065 1.79 3.592 0l.094-.319a.873.873 0 0 1 1.255-.52l.292.16c1.64.893 3.434-.902 2.54-2.541l-.159-.292a.873.873 0 0 1 .52-1.255l.319-.094c1.79-.527 1.79-3.065 0-3.592l-.319-.094a.873.873 0 0 1-.52-1.255l.16-.292c.893-1.64-.902-3.433-2.541-2.54l-.292.159a.873.873 0 0 1-1.255-.52l-.094-.319zm-2.633.283c.246-.835 1.428-.835 1.674 0l.094.319a1.873 1.873 0 0 0 2.693 1.115l.291-.16c.764-.415 1.6.42 1.184 1.185l-.159.292a1.873 1.873 0 0 0 1.116 2.692l.318.094c.835.246.835 1.428 0 1.674l-.319.094a1.873 1.873 0 0 0-1.115 2.693l.16.291c.415.764-.421 1.6-1.185 1.184l-.291-.159a1.873 1.873 0 0 0-2.693 1.116l-.094.318c-.246.835-1.428.835-1.674 0l-.094-.319a1.873 1.873 0 0 0-2.692-1.115l-.292.16c-.764.415-1.6-.421-1.184-1.185l.159-.291A1.873 1.873 0 0 0 1.945 8.93l-.319-.094c-.835-.246-.835-1.428 0-1.674l.319-.094A1.873 1.873 0 0 0 3.06 4.377l-.16-.292c-.415-.764.42-1.6 1.185-1.184l.292.159a1.873 1.873 0 0 0 2.692-1.116l.094-.318z"/></svg>' +
      '설정</button>';
  }
  document.getElementById('nav').innerHTML = html;
}

function renderContent(visible) {
  const wrap = document.getElementById('iframeWrap');
  const btnEdit = document.getElementById('btnEdit');
  const btnOpen = document.getElementById('btnOpen');
  const tbHint = document.getElementById('tbHint');
  const tbBadge = document.getElementById('tbBadge');
  const isManager = currentUser.role === '팀장';

  if (visible.length === 0) {
    document.getElementById('tbTitle').textContent = '열람 가능한 문서가 없습니다';
    tbBadge.style.display='none';btnEdit.style.display='none';btnOpen.style.display='none';tbHint.textContent='';
    wrap.innerHTML = '<div class="url-panel"><div class="url-card" style="text-align:center"><h3>열람 가능한 문서가 없습니다</h3></div></div>';
    return;
  }

  const tab = visible[activeIdx];
  document.getElementById('tbTitle').textContent = tab.name;
  tbBadge.style.display='';
  btnEdit.style.display = isManager ? '' : 'none';

  if (!tab.url) {
    btnOpen.style.display='none';
    tbBadge.textContent='미연결';tbBadge.style.background='rgba(239,68,68,.1)';tbBadge.style.color='#ef4444';
    if (isManager) {
      tbHint.textContent='Google Sheets URL을 연결하세요';
      wrap.innerHTML = '<div class="url-panel"><div class="url-card"><h3>Google Sheets 연결</h3><p>"' + esc(tab.name) + '" 문서의 URL을 입력하세요</p><label>Google Sheets URL</label><input id="inlineUrl" placeholder="https://docs.google.com/spreadsheets/d/..." onkeydown="if(event.key===\'Enter\')connectInline()"><div class="actions"><button class="btn-sm accent" onclick="connectInline()">연결</button></div></div></div>';
    } else {
      tbHint.textContent='관리자가 연결하면 확인 가능';
      wrap.innerHTML = '<div class="url-panel"><div class="url-card" style="text-align:center"><h3>아직 연결되지 않았습니다</h3></div></div>';
    }
  } else {
    btnOpen.style.display='';
    tbHint.textContent='시트에서 직접 수정 가능';
    tbBadge.textContent='Google Sheets';tbBadge.style.background='var(--accent-dim)';tbBadge.style.color='var(--accent)';
    wrap.innerHTML = '<iframe src="' + escAttr(toEmbedUrl(tab.url)) + '" allow="clipboard-read; clipboard-write" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox" loading="lazy"></iframe>';
  }
}

// ══════════ SETTINGS ══════════
async function openSettings() {
  settingsMode = true;
  activeIdx = -1;
  // Load accounts from server
  try {
    const res = await api('getAccounts');
    settingsAccounts = res.accounts || [];
  } catch (err) {
    toast('계정 데이터 로드 실패: ' + err.message, 'err');
    settingsAccounts = [];
  }
  render();
}

function renderSettings() {
  const wrap = document.getElementById('iframeWrap');
  document.getElementById('tbTitle').textContent = '설정';
  document.getElementById('tbBadge').style.display='none';
  document.getElementById('btnEdit').style.display='none';
  document.getElementById('btnOpen').style.display='none';
  document.getElementById('tbHint').textContent='계정 및 탭 URL 관리 (Google Sheets DB 연동)';

  let accRows = settingsAccounts.map((a, i) => '<tr>' +
    '<td><input value="' + esc(a.id) + '" id="acc_id_' + i + '"></td>' +
    '<td><input value="' + esc(a.name) + '" id="acc_name_' + i + '"></td>' +
    '<td><input type="password" value="' + esc(a.pw) + '" id="acc_pw_' + i + '" onfocus="this.type=\'text\'" onblur="this.type=\'password\'"></td>' +
    '<td><select id="acc_role_' + i + '"><option value="팀장"' + (a.role==='팀장'?' selected':'') + '>팀장</option><option value="팀원"' + (a.role==='팀원'?' selected':'') + '>팀원</option></select></td>' +
    '<td style="width:120px;text-align:center">' +
      '<button class="btn-sm" onclick="saveAccRow(' + i + ')" style="height:28px;padding:0 8px;font-size:12px;margin-right:4px">저장</button>' +
      '<button class="btn-sm danger" onclick="deleteAcc(' + i + ')" style="height:28px;padding:0 8px;font-size:12px">삭제</button>' +
    '</td></tr>').join('');

  let tabUrlRows = tabs.map((t, i) => '<div class="s-tab-url">' +
    '<span class="s-tab-name">' + esc(t.name) + '</span>' +
    '<input value="' + esc(t.url||'') + '" placeholder="Google Sheets URL" id="tab_url_' + i + '">' +
    '<select id="tab_role_' + i + '" style="width:120px;flex-shrink:0;height:36px;padding:0 8px;border-radius:6px;border:1px solid var(--border);background:var(--bg-surface);color:var(--text);font-size:13px;font-family:var(--font)">' +
      '<option value="all"' + (t.role==='all'?' selected':'') + '>전체공개</option>' +
      '<option value="팀장"' + (t.role==='팀장'?' selected':'') + '>팀장만</option>' +
    '</select></div>').join('');

  wrap.innerHTML = '<div class="settings-wrap">' +
    '<div class="s-section"><h4>계정 관리 (Google Sheets "계정" 시트 연동)</h4>' +
    '<div style="overflow-x:auto"><table class="s-table"><thead><tr><th>아이디</th><th>이름</th><th>비밀번호</th><th style="width:100px">권한</th><th style="width:120px"></th></tr></thead><tbody>' + accRows + '</tbody></table></div>' +
    '<div class="s-add-row"><input id="newAccId" placeholder="아이디"><input id="newAccName" placeholder="이름"><input id="newAccPw" placeholder="비밀번호"><select id="newAccRole"><option value="팀원">팀원</option><option value="팀장">팀장</option></select><button class="btn-sm accent" onclick="addNewAcc()" style="flex-shrink:0">추가</button></div></div>' +
    '<div class="s-section"><h4>탭별 사이트 주소 관리 (Google Sheets "탭설정" 시트 연동)</h4>' + tabUrlRows +
    '<div class="actions" style="margin-top:20px"><button class="btn-sm accent" onclick="saveAllTabs()">전체 저장</button></div></div></div>';
}

async function saveAccRow(i) {
  const id = document.getElementById('acc_id_' + i).value.trim();
  const name = document.getElementById('acc_name_' + i).value.trim();
  const pw = document.getElementById('acc_pw_' + i).value.trim();
  const role = document.getElementById('acc_role_' + i).value;
  try {
    await api('updateAccount', { rowIndex: i, id, pw, name, role });
    settingsAccounts[i] = { id, pw, name, role };
    toast('계정이 수정되었습니다', 'ok');
  } catch (err) { toast(err.message, 'err'); }
}

async function deleteAcc(i) {
  if (!confirm('이 계정을 삭제하시겠습니까?')) return;
  try {
    await api('deleteAccount', { rowIndex: i });
    settingsAccounts.splice(i, 1);
    render();
    toast('계정이 삭제되었습니다', 'ok');
  } catch (err) { toast(err.message, 'err'); }
}

async function addNewAcc() {
  const id = document.getElementById('newAccId').value.trim();
  const name = document.getElementById('newAccName').value.trim();
  const pw = document.getElementById('newAccPw').value.trim();
  const role = document.getElementById('newAccRole').value;
  if (!id || !name || !pw) { toast('모든 항목을 입력하세요', 'err'); return; }
  try {
    await api('addAccount', { id, pw, name, role });
    settingsAccounts.push({ id, pw, name, role });
    render();
    toast('계정이 추가되었습니다', 'ok');
  } catch (err) { toast(err.message, 'err'); }
}

async function saveAllTabs() {
  for (let i = 0; i < tabs.length; i++) {
    tabs[i].url = document.getElementById('tab_url_' + i).value.trim();
    tabs[i].role = document.getElementById('tab_role_' + i).value;
  }
  try {
    await api('saveTabs', { tabs });
    toast('탭 설정이 저장되었습니다', 'ok');
  } catch (err) { toast(err.message, 'err'); }
}

function renderFooter(visible) {
  const connected = visible.filter(t => t.url).length;
  document.getElementById('footStat').textContent = '탭 ' + visible.length + '개 / 연결됨 ' + connected + '개';
}

// ══════════ TAB ACTIONS ══════════
function selectTab(i) { settingsMode = false; activeIdx = Math.min(i, getVisibleTabs().length - 1); render(); }

async function connectInline() {
  const input = document.getElementById('inlineUrl');
  if (!input) return;
  const url = input.value.trim();
  if (!url) { input.focus(); return; }
  const visible = getVisibleTabs();
  const tab = visible[activeIdx];
  const realIdx = tabs.indexOf(tab);
  if (realIdx >= 0) tabs[realIdx].url = url;
  try {
    await api('saveTabs', { tabs });
    render();
    toast('Google Sheets 연결 완료', 'ok');
  } catch (err) { render(); toast(err.message, 'err'); }
}

function editCurrentUrl() {
  const visible = getVisibleTabs();
  if (visible.length === 0) return;
  const tab = visible[activeIdx];
  editingIdx = tabs.indexOf(tab);
  document.getElementById('modalTitle').textContent = '탭 수정';
  document.getElementById('mName').value = tab.name;
  document.getElementById('mUrl').value = tab.url;
  document.getElementById('mRole').value = tab.role || 'all';
  document.getElementById('modalBg').classList.add('show');
}

function openAddModal() {
  editingIdx = -1;
  document.getElementById('modalTitle').textContent = '새 문서 탭 추가';
  document.getElementById('mName').value = '';document.getElementById('mUrl').value = '';document.getElementById('mRole').value = 'all';
  document.getElementById('modalBg').classList.add('show');
  setTimeout(() => document.getElementById('mName').focus(), 100);
}

function closeModal() { document.getElementById('modalBg').classList.remove('show'); }

async function saveModal() {
  const name = document.getElementById('mName').value.trim();
  const url = document.getElementById('mUrl').value.trim();
  const role = document.getElementById('mRole').value;
  if (!name) { document.getElementById('mName').focus(); return; }
  if (editingIdx >= 0) {
    tabs[editingIdx] = { name, url, role };
  } else {
    tabs.push({ name, url, role });
    activeIdx = getVisibleTabs().length - 1;
  }
  try {
    await api('saveTabs', { tabs });
    toast(editingIdx >= 0 ? '탭이 수정되었습니다' : '새 탭이 추가되었습니다', 'ok');
  } catch (err) { toast(err.message, 'err'); }
  closeModal(); render();
}

function openInNewTab() {
  const visible = getVisibleTabs();
  const tab = visible[activeIdx];
  if (tab && tab.url) {
    const match = tab.url.match(/\/spreadsheets\/d\/([a-zA-Z0-9_-]+)/);
    window.open(match ? 'https://docs.google.com/spreadsheets/d/' + match[1] + '/edit' : tab.url, '_blank');
  }
}

// ══════════ KEYBOARD ══════════
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key >= '1' && e.key <= '9') {
    e.preventDefault();
    const idx = parseInt(e.key) - 1;
    if (idx < getVisibleTabs().length) selectTab(idx);
  }
});

// ══════════ INIT ══════════
if (checkSession()) { showApp(); }
else { document.getElementById('loginScreen').classList.remove('hidden'); setTimeout(() => document.getElementById('loginId').focus(), 200); }
</script>
</body>
</html>
